# ╔═══════════════════════════════════════╗
# ║         STR TERMINAL v3.0             ║
# ║         tmux.conf — skuwii            ║
# ╚═══════════════════════════════════════╝

# ── Prefix ──
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ──
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000
set -sg escape-time 0
set -g focus-events on

# ── Splits ──
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
bind c new-window -c "#{pane_current_path}"

# ── Navigation (vim-style) ──
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Resize ──
bind -r H resize-pane -L 4
bind -r J resize-pane -D 4
bind -r K resize-pane -U 4
bind -r L resize-pane -R 4

# ── Reload ──
bind r source-file ~/.config/tmux/tmux.conf \; display "[ RELOAD ]"

# ── Appearance (colors sourced from pywal cache — toggle with SUPER+SHIFT+T) ──
source-file ~/.cache/wal/colors-tmux.conf

# Transparent panes — inherits kitty's background opacity
set -g window-style 'bg=default'
set -g window-active-style 'bg=default'

# ── Status Bar ──
set -g status-position bottom
set -g status-interval 2
set -g status-left-length 30
set -g status-right-length 60
set -g window-status-separator ""

# Bell
set -g visual-bell off
set -g bell-action other

# ── Copy mode (vi) ──
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi Escape send -X cancel
