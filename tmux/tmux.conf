# ╔═══════════════════════════════════════╗
# ║         STR TERMINAL v3.0             ║
# ║         tmux.conf — skuwii            ║
# ╚═══════════════════════════════════════╝

# ── Prefix ──
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ──
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000
set -sg escape-time 0
set -g focus-events on

# ── Splits ──
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
bind c new-window -c "#{pane_current_path}"

# ── Navigation (vim-style) ──
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Resize ──
bind -r H resize-pane -L 4
bind -r J resize-pane -D 4
bind -r K resize-pane -U 4
bind -r L resize-pane -R 4

# ── Reload ──
bind r source-file ~/.config/tmux/tmux.conf \; display "[ RELOAD ]"

# ── Appearance ──

# Pane borders
set -g pane-border-style "fg=#1c1e21"
set -g pane-active-border-style "fg=#2980d4"

# Message style
set -g message-style "fg=#c8ccd4 bg=#1c1e21"
set -g message-command-style "fg=#2980d4 bg=#1c1e21"

# Mode style (copy mode highlight)
set -g mode-style "fg=#0e0f11 bg=#2980d4"

# ── Status Bar ──
set -g status-position bottom
set -g status-interval 2
set -g status-style "fg=#8a8f98 bg=#0e0f11"

# Left: S mark + session
set -g status-left-length 30
set -g status-left "#[fg=#2980d4,bold]  S #[fg=#4a4e56]│ #[fg=#8a8f98]#S "

# Right: directory + time
set -g status-right-length 60
set -g status-right "#[fg=#4a4e56]#{pane_current_path} #[fg=#4a4e56]│ #[fg=#c8ccd4]%H:%M #[fg=#4a4e56]│ #[fg=#4a4e56,dim]STR"
# Window tabs
set -g window-status-format "#[fg=#4a4e56] #I:#W "
set -g window-status-current-format "#[fg=#c8ccd4,bold]#[bg=#1c1e21] #I:#W #[default]"
set -g window-status-separator ""

# Bell
set -g window-status-bell-style "fg=#c0392b,bold"
set -g visual-bell off
set -g bell-action other

# ── Copy mode (vi) ──
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi Escape send -X cancel
