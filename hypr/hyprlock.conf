# ╔═══════════════════════════════════════╗
# ║         STR TERMINAL v3.0             ║
# ║         hyprlock.conf — skuwii        ║
# ╚═══════════════════════════════════════╝

general {
    grace = 3
    hide_cursor = true
    no_fade_in = false
}

background {
    monitor =
    color = rgb(0e0f11)
    blur_passes = 0
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M')"
    color = rgb(c8ccd4)
    font_size = 64
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 120
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:30000] echo "$(date '+%A · %B %d')"
    color = rgb(4a4e56)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 0, 60
    halign = center
    valign = center
}

# S mark
label {
    monitor =
    text = S
    color = rgb(2980d4)
    font_size = 28
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -40
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 280, 40
    outline_thickness = 1
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgb(1c1e21)
    inner_color = rgb(1c1e21)
    font_color = rgb(c8ccd4)
    fade_on_empty = false
    placeholder_text = enter password
    hide_input = false
    rounding = 6
    check_color = rgb(2980d4)
    fail_color = rgb(c0392b)
    fail_text = <span font_family="JetBrainsMono Nerd Font" foreground="#c0392b">[ AUTH FAILED ]</span>
    fail_transition = 200
    position = 0, -100
    halign = center
    valign = center
}

# STR version — bottom left
label {
    monitor =
    text = STR TERMINAL v3.0
    color = rgb(4a4e56)
    font_size = 9
    font_family = JetBrainsMono Nerd Font
    position = 20, 20
    halign = left
    valign = bottom
}
