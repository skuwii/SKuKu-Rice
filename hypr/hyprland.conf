################
### MONITORS ###
################
monitor=eDP-1,1920x1080@144,0x0,1,vrr,1
monitor=HDMI-A-1,preferred,1920x0,1
###################
### MY PROGRAMS ###
###################
$terminal = kitty
$fileManager = thunar
$menu = bash ~/.config/hypr/scripts/qs_manager.sh toggle applauncher
$mod = SUPER

#################
### AUTOSTART ###
#################
# STR Quickshell environment
env = WALLPAPER_DIR,$HOME/media/wallpapers

# Unblock bluetooth so the panel toggle actually works at session start
exec-once = rfkill unblock bluetooth

# STR Quickshell daemons (run alongside eww — both shells coexist)
exec-once = quickshell -p ~/.config/hypr/scripts/quickshell/Main.qml
exec-once = quickshell -p ~/.config/hypr/scripts/quickshell/TopBar.qml
exec-once = quickshell -p ~/.config/hypr/scripts/quickshell/Floating.qml

exec-once = awww-daemon
exec-once = awww img /home/yousef/media/wallpapers/firewatch.jpg --transition-type none
exec-once = kitty --class dropdown
exec-once = python3 ~/.config/eww/scripts/audio/audio_visualizer.py &
exec-once = cava -p ~/.config/cava/config &
exec-once = eww open dionysus_panel
# dunst replaced by Quickshell NotificationServer (Main.qml)
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = ~/.config/hypr/battery-alert.sh &
exec-once = hypridle
exec-once = easyeffects --gapplication-service
#############################
### ENVIRONMENT VARIABLES ###
#############################
env = WLR_DRM_DEVICES,/dev/dri/card2:/dev/dri/card1
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = WLR_NO_HARDWARE_CURSORS,1
env = WLR_DRM_NO_ATOMIC,1
env = __GL_GSYNC_ALLOWED,1
env = __GL_VRR_ALLOWED,1
#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(2980d4ff) rgba(2980d433) 45deg
    col.inactive_border = rgba(1c1e21aa)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
    allow_tearing = true
}

decoration {
    rounding = 10
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 0.95
    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(00000040)
    }
    blur {
        enabled = true
        size = 6
        passes = 3
        vibrancy = 0.2
    }
}

animations {
    enabled = yes, please :)

    # STR branded curves
    bezier = strSnap,  0.2, 1.0, 0.3, 1.0   # windows: fast settle, precise
    bezier = strSlide, 0.4, 0.0, 0.6, 1.0   # workspaces: clean directional
    bezier = strFade,  0.05, 0.0, 0.1, 1.0  # exits + fades: intentional, instant
    bezier = linear,   0.0,  0.0, 1.0, 1.0

    animation = global,     1, 5,   default
    animation = windows,    1, 3.5, strSnap
    animation = windowsIn,  1, 3.5, strSnap,  popin 85%
    animation = windowsOut, 1, 1.5, strFade,  popin 85%
    animation = workspaces, 1, 2.5, strSlide, slide
    animation = fade,       1, 2.5, strFade
    animation = borderangle, 1, 8, linear, loop
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    vfr = true
    mouse_move_enables_dpms = true
}

#############
### INPUT ###
#############
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
    }
}

gesture = 3, horizontal, workspace

####################
### KEYBINDINGS ###
####################
bind = $mod, Return, exec, $terminal
bind = $mod, Q, killactive
bind = $mod SHIFT, E, exit
bind = $mod, E, exec, $fileManager
bind = $mod, F, fullscreen
bind = $mod, V, togglefloating
bind = $mod, SPACE, exec, $menu
bind = $mod, M, movetoworkspace, special
bind = $mod SHIFT, M, togglespecialworkspace

# Scratchpad workspaces
bind = $mod, F1, togglespecialworkspace, music
bind = $mod, F2, togglespecialworkspace, notes
bind = $mod SHIFT, R, exec, hyprctl reload
bind = $mod, grave, togglespecialworkspace, dropdown

# Focus
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6

# Move to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6

# Scroll workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Move/resize
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Screenshots
bind = , Print, exec, grimblast copy area
bind = SHIFT, Print, exec, grimblast copy screen
bind = SUPER SHIFT, S, exec, grimblast copysave area ~/media/screenshots/$(date +%Y%m%d_%H%M%S).png

# Color picker
bind = SUPER, C, exec, hyprpicker -a

# Clipboard history
bind = SUPER, B, exec, cliphist list | rofi -dmenu -config ~/.config/rofi/config.rasi | cliphist decode | wl-copy
# Lock — hyprlock primary (crash-safe); Lock.qml kept but unbound
bind = $mod SHIFT, L, exec, hyprlock

# STR Quickshell triggers
bind = $mod, W, exec, ~/.config/hypr/scripts/qs_manager.sh toggle wallpaper

# hyprexpo — workspace overview
#bind = $mod, tab, hyprexpo:expo, toggle

# Media keys
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################
# Glassmorphism on Quickshell popup layer
layerrule {
    name = qs-blur
    match:namespace = qs-popups
    blur = true
}

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = dropdown-terminal
    match:class = dropdown
    float = true
    move = 0 0
    size = 100% 40%
    workspace = special:dropdown
}

plugin {
    hyprexpo {
        columns = 3
        gap_size = 6
        bg_col = rgb(0e0f11)
        workspace_method = center current
        skip_empty = true
    }

    dynamic-cursors {
        enabled = true
        mode = tilt
        threshold = 2

        tilt {
            limit = 5000
            function = negative_quadratic
        }

        shake {
            enabled = true
            threshold = 6.0
            factor = 1.5
            expand_effect = true
        }
    }
}
