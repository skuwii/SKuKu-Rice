################
### MONITORS ###
################
monitor=eDP-1,preferred,auto,1

###################
### MY PROGRAMS ###
###################
$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun -config ~/.config/rofi/config.rasi
$mod = SUPER

#################
### AUTOSTART ###
#################
exec-once = waybar > /dev/null 2>&1
exec-once = awww-daemon
exec-once = awww img /home/yousef/media/wallpapers/firewatch.jpg --transition-type none
exec-once = wal -R
exec-once = python3 ~/.config/eww/scripts/audio/audio_visualizer.py &
exec-once = cava -p ~/.config/cava/config &
exec-once = eww daemon && eww open left-panel && eww open right-panel && eww open bottom-bar
exec-once = dunst &
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = WLR_NO_HARDWARE_CURSORS,1
#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(2980d4ee)
    col.inactive_border = rgba(1c1e21aa)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 0.95
    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(00000040)
    }
    blur {
        enabled = true
        size = 6
        passes = 3
        vibrancy = 0.2
    }
}

animations {
    enabled = yes, please :)
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1
    bezier = quick, 0.15, 0, 0.1, 1
    animation = global, 1, 10, default
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, quick, popin 87%
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = fade, 1, 3.03, quick
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

#############
### INPUT ###
#############
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
    }
}

gesture = 3, horizontal, workspace

####################
### KEYBINDINGS ###
####################
bind = $mod, Return, exec, $terminal
bind = $mod, Q, killactive
bind = $mod SHIFT, E, exit
bind = $mod, E, exec, $fileManager
bind = $mod, F, fullscreen
bind = $mod, V, togglefloating
bind = $mod, SPACE, exec, $menu
bind = $mod, M, movetoworkspace, special
bind = $mod SHIFT, M, togglespecialworkspace
bind = $mod SHIFT, R, exec, hyprctl reload

# Focus
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5

# Move to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# Scroll workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Move/resize
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Screenshot to clipboard
bind = $mod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy

# Lock
bind = $mod SHIFT, X, exec, hyprlock

# Media keys
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}
