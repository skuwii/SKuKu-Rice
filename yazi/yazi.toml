[manager]
ratio          = [1, 2, 4]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
show_hidden    = false
show_symlink   = true

[preview]
tab_size   = 2
max_width  = 1200
max_height = 1200
# Kitty graphics protocol — images render natively in kitty, no ueberzugpp needed
image_filter  = "lanczos3"
image_quality = 90
# Video thumbnails via ffmpegthumbnailer (must be installed)
# PDF preview via pdftoppm (poppler)

[opener]
edit = [
  { run = 'nano "$@"', desc = "nano", block = true },
]
open = [
  { run = 'xdg-open "$@"', desc = "Open" },
]
reveal = [
  { run = 'xdg-open "$(dirname "$1")"', desc = "Reveal in file manager" },
]

[open]
rules = [
  { mime = "text/*",       use = "edit" },
  { mime = "image/*",      use = "open" },
  { mime = "video/*",      use = "open" },
  { mime = "audio/*",      use = "open" },
  { mime = "application/pdf", use = "open" },
  { mime = "*",            use = "open" },
]
