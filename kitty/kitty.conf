# ╔═══════════════════════════════════════╗
# ║         STR TERMINAL v3.0             ║
# ║         kitty.conf — skuwii           ║
# ╚═══════════════════════════════════════╝

# ── Font ──
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        12.0

# ── Window ──
background_opacity   0.92
dynamic_background_opacity yes
window_padding_width 12
hide_window_decorations yes
confirm_os_window_close 0
initial_window_width  120c
initial_window_height 36c

# ── Cursor ──
cursor_shape          beam
cursor_beam_thickness 1.5
cursor_blink_interval 0.5

# ── Scrollback ──
scrollback_lines 10000

# ── Tab Bar ──
tab_bar_style       separator
tab_separator       " │ "
tab_title_template  "{index}: {title}"
active_tab_font_style bold

# ── URLs ──
url_style    single
open_url_with default
detect_urls  yes

# ── Bell ──
enable_audio_bell no
visual_bell_duration 0

# ── STR Color Scheme ──

# Background / Foreground
foreground           #c8ccd4
background           #0e0f11
selection_foreground #0e0f11
selection_background #2980d4

# Cursor
cursor               #2980d4
cursor_text_color    #0e0f11

# URL
url_color            #2980d4

# Tab bar
active_tab_foreground   #c8ccd4
active_tab_background   #1c1e21
inactive_tab_foreground #4a4e56
inactive_tab_background #0e0f11
tab_bar_background      #0e0f11

# Normal colors (0-7)
# Black
color0  #1c1e21
# Red
color1  #c0392b
# Green (muted teal — no warm green)
color2  #4a8c7f
# Yellow (muted amber — barely warm)
color3  #8a7e56
# Blue (Azure)
color4  #2980d4
# Magenta (muted cool purple)
color5  #6c5b8a
# Cyan (sky blue)
color6  #5ba3e0
# White
color7  #8a8f98

# Bright colors (8-15)
# Bright Black
color8  #4a4e56
# Bright Red
color9  #d9534f
# Bright Green
color10 #5ea89a
# Bright Yellow
color11 #a09468
# Bright Blue
color12 #3a9aef
# Bright Magenta
color13 #8674a8
# Bright Cyan
color14 #7db8e8
# Bright White
color15 #e8ecf2

# Marks
mark1_foreground #0e0f11
mark1_background #2980d4
mark2_foreground #0e0f11
mark2_background #5ba3e0
mark3_foreground #0e0f11
mark3_background #c0392b
